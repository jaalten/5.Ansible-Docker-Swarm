---
- name: Benchmark Docker Swarm whoami service
  hosts: localhost
  gather_facts: true
  become: true
  tasks:
    - name: Update Debian
      ansible.builtin.apt:
        update_cache: true
      when: ansible_os_family == 'Debian'

    - name: Update RedHat
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_os_family == 'RedHat'

    - name: Install wrk benchmarking tool
      ansible.builtin.package:
        name:
          - wrk
        state: present

- name: Deploy whoami service on Docker Swarm
  hosts: master
  tasks:


    - name: Remove whoami service
      ansible.legacy.command:
        cmd: "docker service rm whoami"
      become: true
      register: rm_output
      failed_when: false
      changed_when: rm_output.rc == 0

    - name: Create whoami service with 1 replica
      ansible.legacy.command:
        cmd: "docker service create --name whoami --publish published=8080,target=80 --replicas 1 traefik/whoami"
      become: true
      register: create_output
      changed_when: create_output.rc == 0

    - name: Wait for service to stabilize
      ansible.builtin.pause:
        seconds: 15

- name: Benchmark with 1 replica
  hosts: localhost
  gather_facts: true
  tasks:
    - name: Run wrk benchmark (1 replica)
      ansible.legacy.command:
        cmd: "wrk -t4 -c5 -d30s http://{{ groups['master'][0] }}:8080"
      register: wrk_1
      changed_when: false

    - name: Display results (1 replica)
      ansible.builtin.debug:
        msg: '{{ wrk_1.stdout_lines | select("search", "Req/Sec") }}'

    - name: Save result for summary
      ansible.builtin.set_fact:
        bench_1: '{{ wrk_1.stdout_lines | select("search", "Req/Sec") | list }}'

- name: Scale to 2 replicas
  hosts: master
  tasks:
    - name: Scale whoami to 2 replicas
      ansible.legacy.command:
        cmd: "docker service scale whoami=2"
      become: true
      changed_when: true

    - name: Wait for service to stabilize
      ansible.builtin.pause:
        seconds: 15

- name: Benchmark with 2 replicas
  hosts: localhost
