- name: Print summary
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Benchmark summary
      ansible.builtin.debug:
        msg:
          - "=== Benchmark Summary ==="
          - "1 replica:  {{ bench_1 }}"
          - "2 replicas: {{ bench_2 }}"
          - "4 replicas: {{ bench_4 }}"
          - "8 replicas: {{ bench_8 }}"
